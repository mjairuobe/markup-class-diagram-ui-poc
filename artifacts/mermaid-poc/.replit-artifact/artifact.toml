kind = "web"
previewPath = "/"
title = "Mermaid Interactive PoC"
version = "1.0.0"
id = "artifacts/mermaid-poc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25768

[services.development]
run = "pnpm --filter @workspace/mermaid-poc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mermaid-poc", "run", "build" ]
publicDir = "artifacts/mermaid-poc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25768"
BASE_PATH = "/"
